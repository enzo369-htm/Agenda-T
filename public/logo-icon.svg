<svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <rect width="48" height="48" rx="12" fill="url(#gradient)" />
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9221ED" />
      <stop offset="1" stop-color="#EF54B4" />
    </linearGradient>
  </defs>
  
  <!-- Calendario -->
  <rect x="10" y="12" width="28" height="28" rx="4" fill="white" opacity="0.95" />
  <rect x="10" y="12" width="28" height="6" rx="2" fill="url(#gradient)" />
  
  <!-- Líneas del calendario -->
  <line x1="18" y1="22" x2="30" y2="22" stroke="#9221ED" stroke-width="2" stroke-linecap="round" />
  <line x1="18" y1="28" x2="30" y2="28" stroke="#EF54B4" stroke-width="2" stroke-linecap="round" />
  <line x1="18" y1="34" x2="26" y2="34" stroke="#9221ED" stroke-width="2" stroke-linecap="round" />
  
  <!-- Punto de entrada (In) -->
  <circle cx="32" cy="28" r="3" fill="#EF54B4" />
  <path d="M30 28 L32 30 L34 28" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>



